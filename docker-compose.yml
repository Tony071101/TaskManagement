version: '3.8'

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: TaskManagementDB
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=TaskManagementDB;Username=your_user;Password=your_password
    ports:
      - "5006:80"